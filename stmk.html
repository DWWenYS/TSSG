<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D模型展示 - glTF</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: #ccc;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            #info { font-size: 10px; top: 10px; left: 10px; }
            #controls-note { font-size: 9px; }
        }
    </style>
</head>
<body>
    <div id="info">
        🚀 3D 模型展示 | 鼠标拖拽旋转 / 右键平移 / 滚轮缩放
    </div>
    <div id="controls-note">
        💡 提示：如果模型未显示，请检查网络控制台（F12）确认模型路径是否正确
    </div>

    <!-- 引入 Three.js 核心库及扩展组件 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); // 深色星空背景
        scene.fog = new THREE.FogExp2(0x111122, 0.02); // 轻微雾效，增强深度感

        // 透视相机：视野，宽高比，近平面，远平面
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true; // 开启阴影映射（如果模型有阴影需求）
        document.body.appendChild(renderer.domElement);

        // --- 控制器 (支持触摸/鼠标) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;      // 惯性效果
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);

        // --- 辅助元素：网格地面和光照 (使模型更立体) ---

        // 1. 辅助网格地面 (帮助判断位置和尺度)
        const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -1.2;
        scene.add(gridHelper);

        // 2. 简单的地面反射光晕 (可选)
        const axesHelper = new THREE.AxesHelper(5);
        // scene.add(axesHelper); // 默认隐藏，需要可取消注释

        // 3. 环境光 (均匀照亮)
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // 4. 主光源：方向光 (产生立体感)
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(3, 5, 2);
        dirLight.castShadow = true;
        dirLight.receiveShadow = false;
        scene.add(dirLight);

        // 5. 辅助背光 (暖色，增加轮廓)
        const backLight = new THREE.PointLight(0xffaa66, 0.5);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);

        // 6. 柔和的填充光 (冷色，从底部)
        const fillLight = new THREE.PointLight(0x6688ff, 0.3);
        fillLight.position.set(0, -1, 0);
        scene.add(fillLight);

        // --- 加载 glTF 模型 ---
        // ⚠️ 重要：请将下方的 URL 替换为你自己的模型地址！
        const modelUrl = 'https://raw.githubusercontent.com/DWWenYS/TSSG/refs/heads/main/GF%E6%89%8B%E6%8F%90%E6%A8%A1%E5%9D%97.gltf';  // 替换为实际地址
        
        const loader = new GLTFLoader();
        
        // 可选：显示加载进度（控制台输出）
        console.log('开始加载模型:', modelUrl);
        
        loader.load(modelUrl, 
            (gltf) => {
                // 加载成功
                const model = gltf.scene;
                scene.add(model);
                
                // 自动调整模型位置和缩放（根据实际模型调整）
                // 如果模型偏离中心，可以手动调整位置：
                // model.position.set(0, 0, 0);
                
                // 可选：让模型居中（计算包围盒）
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center); // 将模型中心移到原点
                
                // 如果模型过大或过小，可以调整缩放比例
                // const size = box.getSize(new THREE.Vector3());
                // const maxDim = Math.max(size.x, size.y, size.z);
                // const scale = 2 / maxDim;
                // model.scale.set(scale, scale, scale);
                
                console.log('模型加载成功，场景已添加');
                
                // 可选：播放动画（如果模型包含动画）
                if (gltf.animations && gltf.animations.length) {
                    const mixer = new THREE.AnimationMixer(model);
                    gltf.animations.forEach((clip) => {
                        const action = mixer.clipAction(clip);
                        action.play();
                    });
                    // 需要在动画循环中更新 mixer
                    window.mixer = mixer;
                }
            },
            (xhr) => {
                // 加载进度
                const percent = (xhr.loaded / xhr.total * 100).toFixed(2);
                console.log(`模型加载中: ${percent}%`);
                // 可选：在界面上显示进度
                const infoDiv = document.getElementById('info');
                if (infoDiv && percent < 100) {
                    infoDiv.innerHTML = `⏳ 加载模型: ${percent}% | 鼠标拖拽旋转 / 右键平移 / 滚轮缩放`;
                } else if (infoDiv) {
                    infoDiv.innerHTML = `🚀 3D 模型展示 | 鼠标拖拽旋转 / 右键平移 / 滚轮缩放`;
                }
            },
            (error) => {
                // 加载失败
                console.error('模型加载失败:', error);
                document.getElementById('info').innerHTML = `❌ 模型加载失败！请检查路径或网络。<br>错误: ${error.message}`;
                document.getElementById('info').style.backgroundColor = 'rgba(200,0,0,0.8)';
            }
        );

        // --- 简单动画循环 ---
        let clock = new THREE.Clock();
        
        function animate() {
            const delta = clock.getDelta();
            
            // 更新动画混合器（如果有动画）
            if (window.mixer) {
                window.mixer.update(delta);
            }
            
            // 更新控制器（必须有）
            controls.update();
            
            // 渲染场景
            renderer.render(scene, camera);
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // --- 窗口尺寸自适应 ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 简单提示控制台
        console.log('页面已启动，等待模型加载...');
    </script>
</body>
</html>
